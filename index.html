<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>For My Chammu ❤️</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    body { font-family: 'Inter', system-ui, sans-serif; }
    .hero { background: linear-gradient(135deg, #9f1239 0%, #be123c 100%); }
    .heart { animation: float 3s ease-in-out infinite; }
    @keyframes float { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-20px); } }
    img { max-width: 100%; height: auto; display: block; }
  </style>
</head>
<body class="bg-rose-50 text-gray-800">

  <!-- Hero Section -->
  <section class="hero min-h-screen flex items-center justify-center text-white relative overflow-hidden">
    <div class="absolute inset-0 bg-black/40"></div>
    
    <div class="absolute top-8 left-1/2 -translate-x-1/2 z-10">
      <div class="w-72 h-72 md:w-[380px] md:h-[380px] rounded-full overflow-hidden border-8 border-white shadow-2xl">
        <img src="us.jpeg" alt="Us ❤️" class="w-full h-full object-cover">
      </div>
    </div>

    <div class="text-center z-20 px-6 mt-48 md:mt-64">
      <div class="text-7xl mb-6 heart">❤️</div>
      <h1 class="text-6xl md:text-7xl font-bold mb-4">My Sweet Chammu</h1>
      <p class="text-3xl mb-8">I love you more every day</p>
    </div>
  </section>

  <!-- Memories Gallery -->
  <section class="py-20 bg-white">
    <div class="max-w-6xl mx-auto px-6">
      <h2 class="text-4xl font-bold text-center mb-12 text-rose-600">Our Beautiful Memories 💕</h2>
      <div class="grid md:grid-cols-3 gap-8">
        <div class="rounded-3xl overflow-hidden shadow-xl">
          <img src="us.jpeg" class="w-full h-80 object-cover">
        </div>
        <div class="rounded-3xl overflow-hidden shadow-xl">
          <img src="chammu-portrait.jpeg" class="w-full h-80 object-cover">
        </div>
        <div class="rounded-3xl overflow-hidden shadow-xl">
          <img src="roses.jpeg" class="w-full h-80 object-cover">
        </div>
      </div>
    </div>
  </section>

  <footer class="py-12 bg-rose-900 text-white text-center">
    <p class="text-2xl">Made with endless love for Chammu 💕</p>
  </footer>

</body>
</html>
