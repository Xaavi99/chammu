<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>For My Chammu ❤️</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { font-family: system-ui, sans-serif; }
    .hero { background: linear-gradient(135deg, #9f1239, #be123c); }
  </style>
</head>
<body class="bg-rose-50">

  <section class="hero min-h-screen flex items-center justify-center text-white text-center p-6">
    <div>
      <h1 class="text-6xl font-bold mb-4">For My Chammu ❤️</h1>
      <p class="text-2xl">I love you endlessly</p>
    </div>
  </section>

  <section class="py-12">
    <div class="max-w-4xl mx-auto px-6">
      <h2 class="text-3xl font-bold text-center mb-8 text-rose-600">Our Memories</h2>
      <div class="grid md:grid-cols-3 gap-6">
        <img src="us.jpeg" class="rounded-2xl shadow-lg" onerror="this.src='https://picsum.photos/id/1015/600/400'">
        <img src="chammu-portrait.jpeg" class="rounded-2xl shadow-lg" onerror="this.src='https://picsum.photos/id/64/600/400'">
        <img src="roses.jpeg" class="rounded-2xl shadow-lg" onerror="this.src='https://picsum.photos/id/201/600/400'">
      </div>
    </div>
  </section>

</body>
</html>
